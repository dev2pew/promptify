name: "CI"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: "read"

jobs:
  test:
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v5"

      - name: "Set up Python 3.13"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v7"
        with:
          enable-cache: "true"

      - name: "Sync dependencies"
        run: "uv sync"

      - name: "Lint"
        run: "uv run ruff check ."

      - name: "Format check"
        run: "uv run ruff format --check ."

      - name: "Test"
        run: "uv run pytest -v"
